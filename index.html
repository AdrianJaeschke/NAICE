<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NAICE - 3D Live Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;300;400&family=Turret+Road:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #BBFF03; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#010103;overflow:hidden;font-family: "Barlow Condensed", sans-serif; font-weight: 300; color:#fff}
        
        #nav-bar { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            display: flex; align-items: center; gap: 15px; 
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 4px;
            border: 1px solid rgba(187,255,3,0.3); backdrop-filter: blur(15px);
        }
        
        #init-trigger {
            position: fixed; inset: 0; z-index: 9999; background: #010103;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out;
        }
        .loader-text { color: var(--neon); font-size: 10px; letter-spacing: 8px; text-transform: uppercase; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #hud-headline { display: none; position: fixed; top: 12%; left: 50%; transform: translateX(-50%); z-index: 1500; text-align: center; pointer-events: none; width: 90%; }
        #hud-headline h1 { font-family: "Turret Road", sans-serif; font-weight: 200; font-size: 5vw; letter-spacing: 20px; color: var(--neon); text-transform: uppercase; text-shadow: 0 0 30px rgba(187,255,3,0.6); margin: 0; }
        #hud-overlay { display: none; position: fixed; top: 30px; right: 40px; z-index: 2000; }
        #close-hud { font-size: 35px; color: var(--neon); cursor: pointer; }
        
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

<div id="init-trigger"><div class="loader-text">SYNCING LIVE REPOSITORY & GLTF...</div></div>

<div id="nav-bar">
    <div onclick="closeHUD()"><img src="assets/naice.png" alt="naice" style="height:35px; cursor: pointer; filter: drop-shadow(0 0 5px var(--neon));"></div>
    <div class="breadcrumb">
        <span onclick="closeHUD()" style="cursor:pointer">HOME</span>
        <span id="case-label" style="display:none; color:var(--neon);"> / <span id="current-case-name"></span></span>
    </div>
</div>

<div id="hud-headline"><h1 id="headline-text"></h1></div>
<div id="hud-overlay"><div id="close-hud" onclick="closeHUD()">✕</div></div>

<canvas id="c"></canvas>

<script>
const GITHUB_USER = "AdrianJaeschke";
const GITHUB_REPO = "NAICE";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let points = [], projects = [], collageImages = []; 
let rotX = 0.3, rotY = 0.5, zoom = 800;
let mouse = { x: 0, y: 0 }, isDrag = false, lastMX, lastMY, activeCase = null;

// --- 1. DIRECT GLTF LOADER (Ohne JSON) ---
async function loadGltfDirectly(url) {
    try {
        const response = await fetch(url);
        if(!response.ok) return;
        const gltf = await response.json();
        const bufferUri = gltf.buffers[0].uri;
        let binaryData;

        if (bufferUri.startsWith('data:')) {
            const base64 = bufferUri.split(',')[1];
            binaryData = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
        } else {
            const binRes = await fetch(url.replace('.gltf', '.bin'));
            binaryData = await binRes.arrayBuffer();
        }

        // Accessor 1: Positionen
        const acc = gltf.accessors[1];
        const bv = gltf.bufferViews[acc.bufferView];
        const byteOffset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const positions = new Float32Array(binaryData, byteOffset, acc.count * 3);

        for (let i = 0; i < positions.length; i += 3) {
            points.push({
                x: positions[i] * 380, y: positions[i+1] * -380, z: positions[i+2] * 380,
                r: 187, g: 255, b: 3, a: 0.3, size: 3.5,
                type: 'model-splat'
            });
        }
    } catch (e) { console.error("GLTF Load Error:", e); }
}

// --- 2. GITHUB REPOSITORY LOADER ---
async function autoLoadPortfolio() {
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/portfolio`);
        const contents = await response.json();
        const folders = contents.filter(item => item.type === 'dir');

        initAtmosphere(); // Hintergrund Cloud

        for (let folder of folders) {
            const fRes = await fetch(folder.url);
            const files = await fRes.json();
            const images = files.filter(f => f.name.match(/\.(jpg|jpeg|png)$/i));
            const textFile = files.find(f => f.name.endsWith('.txt'));

            if (images.length > 0) {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = images[0].download_url + "?t=" + Date.now();
                await new Promise(r => { img.onload = r; img.onerror = r; });

                let headline = folder.name;
                if (textFile) {
                    const txt = await (await fetch(textFile.download_url)).text();
                    headline = txt.split('\n')[0].trim();
                }

                projects.push({
                    name: folder.name, headline: headline.toUpperCase(),
                    cx: 0, cz: 0, focus: 0, img: img,
                    files: images.map(i => i.download_url)
                });
            }
        }

        projects.forEach((p, i) => {
            const angle = (i / projects.length) * Math.PI * 2;
            p.angle = angle; p.cx = Math.sin(angle) * 650; p.cz = Math.cos(angle) * 650;
            extractProjectPoints(p);
        });

        document.getElementById('init-trigger').style.opacity = '0';
        setTimeout(() => document.getElementById('init-trigger').style.display = 'none', 1000);
    } catch (e) { console.error("API Error:", e); }
}

function initAtmosphere() {
    for(let i=0; i<6000; i++) {
        const r = 500 + Math.random() * 1000;
        const t = Math.random() * Math.PI * 2, p = Math.acos(Math.random() * 2 - 1);
        points.push({ x: r*Math.sin(p)*Math.cos(t), y: r*Math.sin(p)*Math.sin(t), z: r*Math.cos(p),
                      r: 187, g: 255, b: 3, a: 0.08, size: 1.5, isBg: true });
    }
}

function extractProjectPoints(proj) {
    const cv = document.createElement('canvas'); cv.width = cv.height = 64;
    const tCtx = cv.getContext('2d');
    tCtx.drawImage(proj.img, 0, 0, 64, 64);
    const d = tCtx.getImageData(0,0,64,64).data;

    for(let i=0; i<1800; i++) {
        const u = Math.random(), v = Math.random();
        const idx = (Math.floor(v*63)*64 + Math.floor(u*63))*4;
        const isMorph = i < 1200;
        points.push({
            parent: proj, type: isMorph ? 'morph' : 'orbit',
            cx: proj.cx, cz: proj.cz, angle: proj.angle,
            rx: (Math.random()-0.5)*400, ry: (Math.random()-0.5)*400, rz: (Math.random()-0.5)*400,
            tx: (u-0.5)*220, ty: (v-0.5)*220,
            r: d[idx], g: d[idx+1], b: d[idx+2], a: isMorph ? 0.8 : 0.4,
            size: isMorph ? 2.5 : 1.8
        });
    }
}

function render() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.fillStyle = '#010103'; ctx.fillRect(0,0,canvas.width,canvas.height);
    const cX = canvas.width / 2, cY = canvas.height / 2;

    if(!activeCase) rotY += 0.002;
    const cY_r = Math.cos(rotY), sY_r = Math.sin(rotY), cX_r = Math.cos(rotX), sX_r = Math.sin(rotX);

    if(!activeCase) {
        projects.forEach(p => {
            let x1 = p.cx*cY_r+p.cz*sY_r, z1 = p.cz*cY_r-p.cx*sY_r, y2 = -z1*sX_r, z2 = z1*cX_r;
            const s = zoom/(zoom+z2);
            const d = Math.sqrt((cX+x1*s-mouse.x)**2+(cY+y2*s-mouse.y)**2);
            p.focus = (d<140*s)?Math.min(1,p.focus+0.07) : Math.max(0,p.focus-0.07);
        });

        const drawList = points.map(p => {
            let x, y, z;
            if(p.type === 'model-splat') { x=p.x; y=p.y; z=p.z; }
            else if(p.isBg) { x=p.x; y=p.y; z=p.z; }
            else {
                const f = p.parent.focus;
                if(p.type === 'morph') {
                    const lx = p.rx*(1-f)+p.tx*f, ly = p.ry*(1-f)+p.ty*f, lz = p.rz*(1-f);
                    x = p.cx + (lx*Math.cos(-p.angle) + lz*Math.sin(-p.angle)); y = ly; z = p.cz + (lz*Math.cos(-p.angle) - lx*Math.sin(-p.angle));
                } else {
                    const pulse = 1 + Math.sin(Date.now()*0.002 + p.rx)*0.1;
                    x = p.cx + (p.rx*pulse*Math.cos(-p.angle) + p.rz*pulse*Math.sin(-p.angle)); y = p.ry*pulse; z = p.cz + (p.rz*pulse*Math.cos(-p.angle) - p.rx*pulse*Math.sin(-p.angle));
                }
            }
            let x1=x*cY_r+z*sY_r, z1=z*cY_r-x*sY_r, y2=y*cX_r-z1*sX_r, z2=z1*cX_r+y*sX_r;
            const s=zoom/(zoom+z2);
            let a = p.isBg ? p.a : (p.type==='model-splat'? p.a : (p.type==='orbit'? p.a*(1+p.parent.focus): p.a));
            return {px:cX+x1*s, py:cY+y2*s, pz:z2, size:p.size*s, color:`rgba(${p.r},${p.g},${p.b},${a})`};
        }).filter(p=>p.pz>-zoom).sort((a,b)=>b.pz-a.pz);

        drawList.forEach(p => {
            ctx.beginPath(); ctx.fillStyle = p.color;
            ctx.arc(p.px, p.py, p.size/2, 0, Math.PI*2); ctx.fill();
        });

        projects.forEach(p => {
            let x1=p.cx*cY_r+p.cz*sY_r, z1=p.cz*cY_r-p.cx*sY_r, y2=-z1*sX_r, z2=z1*cX_r;
            const s=zoom/(zoom+z2);
            if(p.focus>0.01) {
                ctx.save(); ctx.translate(cX+x1*s,cY+y2*s); ctx.globalAlpha=Math.pow(p.focus,5);
                ctx.drawImage(p.img,-110*s,-110*s,220*s,220*s); ctx.restore();
            }
            ctx.save(); ctx.translate(cX+x1*s,cY+y2*s); ctx.globalAlpha = 0.3 + (p.focus*0.7);
            ctx.fillStyle = p.focus > 0.5 ? "var(--neon)" : "#fff";
            ctx.font = `${11*s}px "Barlow Condensed"`; ctx.textAlign="center"; ctx.letterSpacing="4px";
            ctx.fillText(p.headline, 0, 15 + (20*s*p.focus)); ctx.restore();
        });
    } else { renderHUD(cX, cY); }
    requestAnimationFrame(render);
}

function renderHUD(cX, cY) {
    const hRotY = (mouse.x-cX)*0.0003, hRotX = -(mouse.y-cY)*0.0003;
    const cY_h=Math.cos(hRotY), sY_h=Math.sin(hRotY), cX_h=Math.cos(hRotX), sX_h=Math.sin(hRotX);
    collageImages.map(img => {
        let x1=img.x*cY_h+img.z*sY_h, z1=img.z*cY_h-img.x*sY_h, y2=img.y*cX_h-z1*sX_h, z2=z1*cX_h+img.y*sX_h;
        return {...img, x1, y2, z2};
    }).sort((a,b)=>b.z2-a.z2).forEach(img => {
        const s = 1000/(1000+img.z2);
        const w = img.aspect>1 ? img.baseSize*s : img.baseSize*s*img.aspect;
        const h = img.aspect>1 ? (img.baseSize*s)/img.aspect : img.baseSize*s;
        ctx.save(); ctx.translate(cX+img.x1*s, cY+img.y2*s); ctx.rotate(img.rot);
        ctx.globalAlpha=0.95; ctx.drawImage(img.el, -w/2, -h/2, w, h); ctx.restore();
    });
}

async function openCaseHUD(p) {
    activeCase = p;
    document.getElementById('headline-text').innerText = p.headline;
    document.getElementById('hud-headline').style.display = "block";
    document.getElementById('case-label').style.display = "inline";
    document.getElementById('current-case-name').innerText = p.name;
    document.getElementById('hud-overlay').style.display = "block";
    collageImages = [];
    for(let [i, url] of p.files.entries()) {
        const img = new Image(); img.crossOrigin="anonymous"; img.src=url; await new Promise(r=>img.onload=r);
        const isL = i===0;
        collageImages.push({ el:img, aspect:img.width/img.height, x:isL?0:(Math.random()-0.5)*600, y:isL?50:(Math.random()-0.5)*600, z:isL?-200:Math.random()*400, baseSize:isL?500:250, rot:(Math.random()-0.5)*0.2 });
    }
}

function closeHUD() { activeCase=null; document.getElementById('hud-headline').style.display="none"; document.getElementById('case-label').style.display="none"; document.getElementById('hud-overlay').style.display="none"; }

canvas.onmousemove=e=>{mouse.x=e.clientX;mouse.y=e.clientY};
canvas.onmousedown=e=>{
    isDrag=false; lastMX=e.clientX; lastMY=e.clientY;
    const mm=ev=>{ if(Math.abs(ev.clientX-lastMX)>5)isDrag=true; rotY+=(ev.clientX-lastMX)*0.005; rotX+=(ev.clientY-lastMY)*0.005; lastMX=ev.clientX; lastMY=ev.clientY; };
    const mu=()=>{window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu)};
    window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
};
canvas.onclick=()=>{if(!isDrag&&!activeCase){const a=projects.find(p=>p.focus>0.7); if(a)openCaseHUD(a)}};
canvas.onwheel=e=>{if(!activeCase){e.preventDefault(); zoom-=e.deltaY}};

window.onload = () => { autoLoadPortfolio(); loadGltfDirectly('textured.gltf'); };
render();
</script>
</body>
</html>
