<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NAICE - Final Fix</title>
    <style>
        :root { --neon: #BBFF03; }
        body { background: #010103; margin: 0; overflow: hidden; font-family: sans-serif; color: #fff; }
        #status-bar { position: fixed; top: 10px; right: 10px; font-size: 10px; color: var(--neon); background: rgba(0,0,0,0.8); padding: 5px; border: 1px solid var(--neon); z-index: 1000; }
        #nav { position: absolute; top: 20px; left: 20px; z-index: 100; display: flex; align-items: center; }
        #logo { height: 40px; filter: drop-shadow(0 0 5px var(--neon)); transition: opacity 0.5s; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="status-bar">SYSTEM: BOOTING...</div>

<div id="nav">
    <img id="logo" src="./assets/naice.png" alt="NAICE" onerror="this.style.display='none'; console.log('Logo Pfad falsch!')">
    <span style="color:var(--neon); margin-left: 15px; letter-spacing: 3px; font-weight: bold;">3D CORE</span>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status-bar');

let points = [];
let rotY = 0, rotX = 0.3, zoom = 1200;

// Hilfsfunktion für Logs
function log(msg, err = false) {
    status.innerText = msg;
    if(err) status.style.color = "#ff4444";
    console.log(msg);
}

// 1. GLTF & BIN LOADER (Das Zentrum)
async function loadCore() {
    try {
        log("Lade Geometrie...");
        const res = await fetch('./textured.gltf');
        if(!res.ok) throw new Error("textured.gltf nicht gefunden!");
        const gltf = await res.json();

        // WICHTIG: Deine Datei braucht die .bin! [cite: 1]
        const binUrl = gltf.buffers[0].uri;
        const binRes = await fetch(binUrl);
        if(!binRes.ok) throw new Error(`${binUrl} fehlt im Ordner!`);
        const binData = await binRes.arrayBuffer();

        const acc = gltf.accessors[1];
        const bv = gltf.bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const stride = bv.byteStride || 32; // Laut deiner Datei 32 Bytes [cite: 1]
        const dv = new DataView(binData);

        for (let i = 0; i < acc.count; i++) {
            const s = offset + (i * stride);
            points.push({
                x: dv.getFloat32(s, true) * 800,
                y: dv.getFloat32(s + 4, true) * -800,
                z: dv.getFloat32(s + 8, true) * 800
            });
        }
        log(`CORE: ${points.length} PKT GELADEN`);
    } catch (e) {
        log("LOAD ERROR: " + e.message, true);
    }
}

// 2. PORTFOLIO (Sicherung gegen 403 Forbidden)
async function loadPortfolio() {
    try {
        const res = await fetch(`https://api.github.com/repos/AdrianJaeschke/NAICE/contents/portfolio`);
        if(res.status === 403) return log("GITHUB API LIMIT (Warte 60min)");
        const data = await res.json();
        if(Array.isArray(data)) log("PORTFOLIO BEREIT");
    } catch (e) { console.log("Portfolio Error gefangen."); }
}

// 3. RENDER LOOP
function render() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#010103';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const cx = canvas.width/2, cy = canvas.height/2;
    rotY += 0.005;
    const cY = Math.cos(rotY), sY = Math.sin(rotY), cX = Math.cos(rotX), sX = Math.sin(rotX);

    ctx.fillStyle = '#BBFF03';
    points.forEach(p => {
        let x1 = p.x * cY + p.z * sY;
        let z1 = p.z * cY - p.x * sY;
        let y2 = p.y * cX - z1 * sX;
        let z2 = z1 * cX + p.y * sX;

        const s = zoom / (zoom + z2);
        if(z2 > -zoom) {
            ctx.globalAlpha = 0.4 * s;
            ctx.fillRect(cx + x1 * s, cy + y2 * s, 2 * s, 2 * s);
        }
    });

    requestAnimationFrame(render);
}

window.onload = () => {
    loadCore();
    loadPortfolio();
    render();
};
</script>
</body>
</html>
