<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NAICE - 3D Core Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;400&family=Turret+Road:wght@200;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #BBFF03; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#010103;overflow:hidden;font-family: "Barlow Condensed", sans-serif; color:#fff}
        
        #nav-bar { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            display: flex; align-items: center; gap: 15px; 
            background: rgba(0,0,0,0.6); padding: 10px; border: 1px solid rgba(187,255,3,0.3); backdrop-filter: blur(15px);
        }
        
        #status-info { position: fixed; top: 10px; right: 10px; font-size: 9px; color: var(--neon); font-family: monospace; opacity: 0.5; }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

<div id="status-info">CORE ENGINE ACTIVE</div>

<div id="nav-bar">
    <img id="naice-logo" src="assets/naice.png" alt="naice" style="height:35px; filter: drop-shadow(0 0 5px var(--neon));" onerror="this.src='naice.png'; this.onerror=null;">
    <div style="letter-spacing: 5px; font-weight: 200; color: var(--neon); margin-left: 10px;">3D CORE</div>
</div>

<canvas id="c"></canvas>

<script>
const GITHUB_USER = "AdrianJaeschke";
const GITHUB_REPO = "NAICE";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let points = [], projects = []; 
let rotX = 0.3, rotY = 0.5, zoom = 1200;
let mouse = { x: 0, y: 0 };

// --- 1. CORE MODELL LADEN (Verkleinert) ---
async function loadCore() {
    try {
        const response = await fetch('textured.gltf');
        const gltf = await response.json();
        const binRes = await fetch(gltf.buffers[0].uri);
        const binData = await binRes.arrayBuffer();

        const acc = gltf.accessors[1];
        const bv = gltf.bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const stride = bv.byteStride || 32;
        const dv = new DataView(binData);

        for (let i = 0; i < acc.count; i++) {
            const s = offset + (i * stride);
            points.push({
                x: dv.getFloat32(s, true) * 450, // Kleiner skaliert (vorher 800)
                y: dv.getFloat32(s + 4, true) * -450,
                z: dv.getFloat32(s + 8, true) * 450,
                r: 187, g: 255, b: 3, a: 0.3, size: 2.5,
                type: 'core'
            });
        }
    } catch (e) { console.error("Core Error", e); }
}

// --- 2. ATMOSPHÄRE & CASES ---
function initWorld() {
    // Hintergrund-Punkte (Cloud)
    for(let i=0; i<3000; i++) {
        const r = 1000 + Math.random() * 1000;
        const t = Math.random() * Math.PI * 2, p = Math.acos(Math.random() * 2 - 1);
        points.push({ 
            x: r*Math.sin(p)*Math.cos(t), y: r*Math.sin(p)*Math.sin(t), z: r*Math.cos(p),
            r: 187, g: 255, b: 3, a: 0.1, size: 1.5, isBg: true 
        });
    }

    // Dummy Cases (da API oft 403 Forbidden ist)
    const caseNames = ["PROJECT ALPHA", "DIGITAL ART", "CORE V2", "STUDIO"];
    caseNames.forEach((name, i) => {
        const angle = (i / caseNames.length) * Math.PI * 2;
        projects.push({
            name: name,
            cx: Math.sin(angle) * 800,
            cz: Math.cos(angle) * 800,
            focus: 0
        });
    });
}

// --- 3. RENDER ENGINE ---
function render() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#010103';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const cX = canvas.width / 2, cY = canvas.height / 2;
    rotY += 0.002;

    const cY_r = Math.cos(rotY), sY_r = Math.sin(rotY), cX_r = Math.cos(rotX), sX_r = Math.sin(rotX);

    // Projekte Logik
    projects.forEach(p => {
        let x1 = p.cx*cY_r+p.cz*sY_r, z1 = p.cz*cY_r-p.cx*sY_r, y2 = -z1*sX_r, z2 = z1*cX_r;
        const s = zoom/(zoom+z2);
        const dx = cX+x1*s - mouse.x, dy = cY+y2*s - mouse.y;
        p.focus = (Math.sqrt(dx*dx+dy*dy) < 100) ? Math.min(1, p.focus+0.1) : Math.max(0, p.focus-0.1);
        
        // Zeichne Label
        ctx.save(); ctx.translate(cX+x1*s, cY+y2*s);
        ctx.globalAlpha = 0.3 + p.focus * 0.7;
        ctx.fillStyle = "var(--neon)";
        ctx.font = `${14*s}px Turret Road`; ctx.textAlign = "center";
        ctx.fillText(p.name, 0, 40*s);
        ctx.restore();
    });

    // Punkte Zeichnen
    const drawList = points.map(p => {
        let x1=p.x*cY_r+p.z*sY_r, z1=p.z*cY_r-p.x*sY_r, y2=p.y*cX_r-z1*sX_r, z2=z1*cX_r+p.y*sX_r;
        const s=zoom/(zoom+z2);
        return {px:cX+x1*s, py:cY+y2*s, pz:z2, size:p.size*s, a:p.a*s, color:`rgba(${p.r},${p.g},${p.b},`};
    }).filter(p=>p.pz>-zoom).sort((a,b)=>b.pz-a.pz);

    drawList.forEach(p => {
        ctx.globalAlpha = p.a;
        ctx.fillStyle = p.color + p.a + ")";
        ctx.fillRect(p.px, p.py, p.size, p.size);
    });

    requestAnimationFrame(render);
}

window.onload = () => {
    initWorld();
    loadCore();
    render();
};

window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
</script>
</body>
</html>
