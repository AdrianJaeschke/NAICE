<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NAICE - Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #BBFF03; }
        body { background: #010103; margin: 0; overflow: hidden; font-family: "Barlow Condensed", sans-serif; color: #fff; }
        #status { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: var(--neon); z-index: 100; background: rgba(0,0,0,0.5); padding: 5px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="status">System: Initialisiere...</div>
<canvas id="c"></canvas>

<script>
const GITHUB_USER = "AdrianJaeschke";
const GITHUB_REPO = "NAICE";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let points = [], projects = [];
let rotX = 0.3, rotY = 0.5, zoom = 1100;

function log(msg) { statusEl.innerText = msg; console.log(msg); }

// --- 1. GLTF & BIN LOADER ---
async function loadGltfAndBin() {
    const gltfUrl = 'textured.gltf';
    try {
        log("Lade textured.gltf...");
        const response = await fetch(gltfUrl);
        if (!response.ok) throw new Error("gltf nicht gefunden");
        const gltf = await response.json();

        // Extrahiere den Pfad zur .bin Datei 
        const binFileName = gltf.buffers[0].uri; 
        log(`Lade Binärdaten: ${binFileName}...`);
        
        const binRes = await fetch(binFileName);
        if (!binRes.ok) throw new Error(`${binFileName} nicht im selben Ordner gefunden! (404)`);
        const binData = await binRes.arrayBuffer();

        // Zugriff auf Accessor 1 (Positionen) 
        const acc = gltf.accessors[1];
        const bv = gltf.bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const stride = bv.byteStride || 12; // In deiner Datei 32 
        const dv = new DataView(binData);

        for (let i = 0; i < acc.count; i++) {
            const start = offset + (i * stride);
            points.push({
                x: dv.getFloat32(start, true) * 800,
                y: dv.getFloat32(start + 4, true) * -800,
                z: dv.getFloat32(start + 8, true) * 800,
                r: 187, g: 255, b: 3, a: 0.4
            });
        }
        log("Kern geladen: " + points.length + " Punkte.");
    } catch (e) {
        log("FEHLER: " + e.message);
    }
}

// --- 2. GITHUB API MIT PROTECTION ---
async function autoLoadPortfolio() {
    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/portfolio`);
        if (res.status === 403) {
            log("GitHub Rate Limit erreicht. Portfolio lädt später.");
            return;
        }
        const contents = await res.json();
        if (!Array.isArray(contents)) return; // Fix für "filter is not a function"

        log("Portfolio Daten empfangen.");
        // Hier käme deine restliche Logik für die Projekt-Ordner...
    } catch (e) {
        console.error("API Error", e);
    }
}

function render() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#010103';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cX = canvas.width / 2, cY = canvas.height / 2;
    rotY += 0.003;
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

    points.forEach(p => {
        let x1 = p.x * cosY + p.z * sinY;
        let z1 = p.z * cosY - p.x * sinY;
        let y2 = p.y * cosX - z1 * sinX;
        let z2 = z1 * cosX + p.y * sinX;

        const s = zoom / (zoom + z2);
        if (z2 > -zoom) {
            ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.a * s})`;
            ctx.fillRect(cX + x1 * s, cY + y2 * s, 2 * s, 2 * s);
        }
    });
    requestAnimationFrame(render);
}

window.onload = () => {
    loadGltfAndBin();
    autoLoadPortfolio();
    render();
};
</script>
</body>
</html>
