<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NAICE - 3D Core Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;400&family=Turret+Road:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #BBFF03; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#010103;overflow:hidden;font-family: "Barlow Condensed", sans-serif; color:#fff}
        
        /* UI */
        #nav-bar { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6); padding: 10px; border: 1px solid rgba(187,255,3,0.3); backdrop-filter: blur(15px); }
        #status { position: fixed; top: 10px; right: 10px; font-size: 10px; color: var(--neon); font-family: monospace; z-index: 1000; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }

        /* Projekt Fenster */
        #project-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 80vw; height: 80vh; background: rgba(1,1,3,0.95);
            border: 1px solid var(--neon); box-shadow: 0 0 50px rgba(187,255,3,0.2);
            z-index: 2000; display: none; opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden; pointer-events: none;
        }
        #project-window.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: all; }
        #close-btn { position: absolute; top: 20px; right: 20px; color: var(--neon); cursor: pointer; font-size: 20px; z-index: 2100; }
        #collage-container { position: relative; width: 100%; height: 100%; perspective: 1000px; }
        .collage-img { 
            position: absolute; width: 300px; height: auto; border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.1s ease-out; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="status">SYSTEM: READY</div>
<div id="nav-bar">
    <img id="logo" src="assets/naice.png" alt="naice" style="height:35px; filter: drop-shadow(0 0 5px var(--neon));" onerror="this.src='naice.png'">
    <div style="letter-spacing: 5px; font-weight: 200; color: var(--neon); margin-left: 10px;">NAICE PORTFOLIO</div>
</div>

<div id="project-window">
    <div id="close-btn" onclick="closeProject()">[ CLOSE ]</div>
    <div id="collage-container"></div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const win = document.getElementById('project-window');
const collage = document.getElementById('collage-container');

let points = [], projects = []; 
let rotX = 0.3, rotY = 0.5, zoom = 1100;
let mouse = { x: 0, y: 0 }, lastMouse = { x: 0, y: 0 };
let isDragging = false, isWindowOpen = false;

// --- 1. CORE & WORLD LOAD ---
async function loadCore() {
    try {
        const res = await fetch('textured.gltf');
        const gltf = await res.json();
        const binRes = await fetch(gltf.buffers[0].uri);
        const binData = await binRes.arrayBuffer();
        const acc = gltf.accessors[1], bv = gltf.bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const stride = bv.byteStride || 32, dv = new DataView(binData);

        for (let i = 0; i < acc.count; i++) {
            const s = offset + (i * stride);
            points.push({
                x: dv.getFloat32(s, true) * 500, y: dv.getFloat32(s+4, true) * -500, z: dv.getFloat32(s+8, true) * 500,
                r: 187, g: 255, b: 3, a: 0.3, size: 2, type: 'core'
            });
        }
    } catch (e) { console.error(e); }
}

async function loadPortfolio() {
    try {
        const res = await fetch(`https://api.github.com/repos/AdrianJaeschke/NAICE/contents/portfolio`);
        const folders = await res.json();
        let angleIdx = 0;
        const dirFolders = folders.filter(f => f.type === 'dir');

        for (let folder of dirFolders) {
            const fRes = await fetch(folder.url);
            const files = await fRes.json();
            const imgFiles = files.filter(f => f.name.match(/\.(jpg|jpeg|png)$/i));
            const txtFile = files.find(f => f.name.endsWith('.txt'));

            let dName = folder.name.toUpperCase();
            if (txtFile) {
                const tRes = await fetch(txtFile.download_url);
                const t = await tRes.text(); dName = t.split('\n')[0].trim();
            }

            if (imgFiles.length > 0) {
                const img = new Image(); img.crossOrigin = "anonymous";
                img.src = imgFiles[0].download_url;
                await new Promise(r => img.onload = r);

                const angle = (angleIdx / dirFolders.length) * Math.PI * 2;
                const proj = { 
                    name: dName, cx: Math.sin(angle)*600, cz: Math.cos(angle)*600, 
                    focus: 0, img: img, angle: angle, allImages: imgFiles 
                };
                projects.push(proj);
                extractPoints(proj);
                angleIdx++;
            }
        }
    } catch (e) { console.error(e); }
}

function extractPoints(proj) {
    const tempC = document.createElement('canvas'); tempC.width = tempC.height = 64;
    const tCtx = tempC.getContext('2d'); tCtx.drawImage(proj.img, 0, 0, 64, 64);
    const d = tCtx.getImageData(0,0,64,64).data;
    for(let i=0; i<400; i++) {
        const u = Math.random(), v = Math.random();
        const idx = (Math.floor(v*63)*64 + Math.floor(u*63))*4;
        points.push({ parent: proj, type: 'case-point', rx: (Math.random()-0.5)*120, ry: (Math.random()-0.5)*120, rz: (Math.random()-0.5)*120, tx: (u-0.5)*150, ty: (v-0.5)*180, r: d[idx], g: d[idx+1], b: d[idx+2], a: 0.6, size: 2 });
    }
}

// --- 2. EVENTS (DRAG & CLICK) ---
canvas.onmousedown = (e) => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; };
window.onmouseup = () => { isDragging = false; };
window.onmousemove = (e) => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    if (isDragging && !isWindowOpen) {
        rotY += (e.clientX - lastMouse.x) * 0.005;
        rotX += (e.clientY - lastMouse.y) * 0.005;
        lastMouse = { x: e.clientX, y: e.clientY };
    }
    // Parallaxe für Collage
    if (isWindowOpen) {
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
        document.querySelectorAll('.collage-img').forEach((el, i) => {
            const depth = (i + 1) * 30;
            el.style.transform = `translate(${dx * depth}px, ${dy * depth}px) rotateX(${dy * 5}deg) rotateY(${dx * -5}deg)`;
        });
    }
};

canvas.onclick = () => {
    const active = projects.find(p => p.focus > 0.8);
    if (active) openProject(active);
};

function openProject(proj) {
    isWindowOpen = true;
    collage.innerHTML = "";
    win.classList.add('active');
    proj.allImages.forEach((imgObj, i) => {
        const el = document.createElement('img');
        el.src = imgObj.download_url;
        el.className = 'collage-img';
        el.style.left = `${15 + Math.random() * 50}%`;
        el.style.top = `${15 + Math.random() * 50}%`;
        el.style.zIndex = i;
        collage.appendChild(el);
    });
}

function closeProject() {
    isWindowOpen = false;
    win.classList.remove('active');
}

// --- 3. RENDER ---
function render() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.fillStyle = '#010103'; ctx.fillRect(0,0,canvas.width,canvas.height);
    const cx = canvas.width/2, cy = canvas.height/2;

    if (!isDragging && !isWindowOpen) rotY += 0.002;
    const cyR = Math.cos(rotY), syR = Math.sin(rotY), cxR = Math.cos(rotX), sxR = Math.sin(rotX);

    projects.forEach(p => {
        let x1 = p.cx*cyR + p.cz*syR, z1 = p.cz*cyR - p.cx*syR, y2 = -z1*sxR, z2 = z1*cxR;
        const s = zoom/(zoom+z2);
        const dist = Math.sqrt((cx+x1*s - mouse.x)**2 + (cy+y2*s - mouse.y)**2);
        p.focus = (dist < 80*s) ? Math.min(1, p.focus + 0.1) : Math.max(0, p.focus - 0.1);
    });

    const drawList = points.map(p => {
        let x, y, z;
        if(p.type === 'core') { x = p.x; y = p.y; z = p.z; }
        else if(p.type === 'case-point') {
            const f = p.parent.focus;
            const lx = p.rx*(1-f) + p.tx*f, ly = p.ry*(1-f) + p.ty*f, lz = p.rz*(1-f);
            x = p.parent.cx + (lx*Math.cos(-p.parent.angle) + lz*Math.sin(-p.parent.angle));
            y = ly; z = p.parent.cz + (lz*Math.cos(-p.parent.angle) - lx*Math.sin(-p.parent.angle));
        } else return null;

        let x1 = x*cyR + z*syR, z1 = z*cyR - x*syR, y2 = y*cxR - z1*sxR, z2 = z1*cxR + y*sxR;
        const s = zoom / (zoom + z2);
        if(z2 < -zoom + 100) return null;
        return { px: cx+x1*s, py: cy+y2*s, pz: z2, s: p.size*s, col: `rgba(${p.r},${p.g},${p.b},${p.a*s})` };
    }).filter(p => p).sort((a,b) => b.pz - a.pz);

    drawList.forEach(p => { ctx.fillStyle = p.col; ctx.fillRect(p.px, p.py, p.s, p.s); });

    projects.forEach(p => {
        let x1 = p.cx*cyR + p.cz*syR, z1 = p.cz*cyR - p.cx*syR, y2 = -z1*sxR, z2 = z1*cxR;
        const s = zoom/(zoom+z2);
        if(z2 < -zoom) return;
        ctx.save(); ctx.translate(cx+x1*s, cy+y2*s);
        ctx.globalAlpha = 0.4 + p.focus * 0.6;
        ctx.fillStyle = "#FFFFFF"; ctx.font = `${14*s}px "Turret Road"`; ctx.textAlign = "center";
        ctx.fillText(p.name, 0, 40*s);
        if(p.focus > 0.1) ctx.drawImage(p.img, -45*s, -110*s, 90*s, 90*s);
        ctx.restore();
    });

    requestAnimationFrame(render);
}

window.onload = () => { loadCore(); loadPortfolio(); render(); };
</script>
</body>
</html>
