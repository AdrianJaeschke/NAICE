<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NAICE - 3D Core Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;400&family=Turret+Road:wght@200;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #BBFF03; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#010103;overflow:hidden;font-family: "Barlow Condensed", sans-serif; color:#fff}
        
        #nav-bar { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            display: flex; align-items: center; gap: 15px; 
            background: rgba(0,0,0,0.6); padding: 10px; border: 1px solid rgba(187,255,3,0.3); backdrop-filter: blur(15px);
        }
        
        #status-info { position: fixed; top: 10px; right: 10px; font-size: 9px; color: var(--neon); font-family: monospace; opacity: 0.5; }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

<div id="status-info">CORE ENGINE ACTIVE | RADIUS ADJUSTED</div>

<div id="nav-bar">
    <img id="naice-logo" src="assets/naice.png" alt="naice" style="height:35px; filter: drop-shadow(0 0 5px var(--neon));" onerror="this.src='naice.png'; this.onerror=null;">
    <div style="letter-spacing: 5px; font-weight: 200; color: var(--neon); margin-left: 10px;">3D CORE</div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let points = [], projects = []; 
let rotX = 0.3, rotY = 0.5, zoom = 1000;
let mouse = { x: 0, y: 0 };

// --- 1. MODELL LADEN (Skalierung angepasst) ---
async function loadCore() {
    try {
        const response = await fetch('textured.gltf');
        const gltf = await response.json();
        const binRes = await fetch(gltf.buffers[0].uri);
        const binData = await binRes.arrayBuffer();

        const acc = gltf.accessors[1];
        const bv = gltf.bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const stride = bv.byteStride || 32;
        const dv = new DataView(binData);

        for (let i = 0; i < acc.count; i++) {
            const s = offset + (i * stride);
            points.push({
                x: dv.getFloat32(s, true) * 350, // Kleinerer Kopf
                y: dv.getFloat32(s + 4, true) * -350,
                z: dv.getFloat32(s + 8, true) * 350,
                r: 187, g: 255, b: 3, a: 0.25, size: 2
            });
        }
    } catch (e) { console.error("Core Load Error", e); }
}

// --- 2. WELT INITIALISIEREN (Radius verkleinert) ---
function initWorld() {
    // Hintergrund-Atmosphäre
    for(let i=0; i<2000; i++) {
        const r = 600 + Math.random() * 800;
        const t = Math.random() * Math.PI * 2, p = Math.acos(Math.random() * 2 - 1);
        points.push({ 
            x: r*Math.sin(p)*Math.cos(t), y: r*Math.sin(p)*Math.sin(t), z: r*Math.cos(p),
            r: 187, g: 255, b: 3, a: 0.1, size: 1.2, isBg: true 
        });
    }

    // Cases mit kleinerem Radius (400 statt 800)
    const caseNames = ["PROJECT ALPHA", "DIGITAL ART", "CORE V2", "STUDIO INTERFACE"];
    caseNames.forEach((name, i) => {
        const angle = (i / caseNames.length) * Math.PI * 2;
        projects.push({
            name: name,
            cx: Math.sin(angle) * 450, // Radius auf 450px gesetzt
            cz: Math.cos(angle) * 450,
            focus: 0
        });
    });
}

// --- 3. RENDER LOOP ---
function render() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#010103';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const cX = canvas.width / 2, cY = canvas.height / 2;
    rotY += 0.003;

    const cYr = Math.cos(rotY), sYr = Math.sin(rotY), cXr = Math.cos(rotX), sXr = Math.sin(rotX);

    // 1. ZUERST: Punkte berechnen und sortieren
    const drawList = points.map(p => {
        let x1 = p.x*cYr + p.z*sYr, z1 = p.z*cYr - p.x*sYr, y2 = p.y*cXr - z1*sXr, z2 = z1*cXr + p.y*sXr;
        const s = zoom / (zoom + z2);
        return { px: cX + x1*s, py: cY + y2*s, pz: z2, size: p.size*s, a: p.a*s, r:p.r, g:p.g, b:p.b };
    }).filter(p => p.pz > -zoom + 100); // Clipping gegen "Umstülpen" der Kamera

    // 2. ZEICHNEN: Core & Background
    drawList.sort((a,b) => b.pz - a.pz).forEach(p => {
        ctx.globalAlpha = p.a;
        ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
        ctx.fillRect(p.px, p.py, p.size, p.size);
    });

    // 3. ZEICHNEN: Projekte/Cases
    projects.forEach(p => {
        let x1 = p.cx*cYr + p.cz*sYr, z1 = p.cz*cYr - p.cx*sYr, y2 = -z1*sXr, z2 = z1*cXr;
        const s = zoom / (zoom + z2);
        
        // Hover-Logik
        const dx = cX+x1*s - mouse.x, dy = cY+y2*s - mouse.y;
        if (Math.sqrt(dx*dx + dy*dy) < 60) p.focus = Math.min(1, p.focus + 0.1);
        else p.focus = Math.max(0, p.focus - 0.1);

        if (z2 > -zoom + 200) {
            ctx.save();
            ctx.translate(cX+x1*s, cY+y2*s);
            ctx.globalAlpha = 0.4 + p.focus * 0.6;
            ctx.fillStyle = "var(--neon)";
            ctx.font = `${16*s}px "Turret Road"`;
            ctx.textAlign = "center";
            ctx.fillText(p.name, 0, 0);
            
            // Kleiner Indikator-Punkt unter dem Text
            ctx.beginPath();
            ctx.arc(0, 10*s, 3*s, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    });

    ctx.globalAlpha = 1;
    requestAnimationFrame(render);
}

window.onload = () => {
    initWorld();
    loadCore();
    render();
};

window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
</script>
</body>
</html>
