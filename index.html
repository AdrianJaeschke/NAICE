<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NAICE - 3D Core Fix</title>
    <style>
        body { background: #010103; margin: 0; overflow: hidden; color: #BBFF03; font-family: sans-serif; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 12px; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="status">Status: Initialisierung...</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let points = [];
let rotY = 0, rotX = 0.4, zoom = 1200;

async function loadGltf() {
    const url = 'textured.gltf';
    statusEl.innerText = "Status: Lade " + url + "...";

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("Datei nicht gefunden. Server gestartet? Pfad korrekt?");
        
        const gltf = await response.json();
        
        // Suche den Buffer (Meistens die .bin Datei)
        const bufferInfo = gltf.buffers[0];
        let binUrl = bufferInfo.uri;
        
        // Falls die URI ein relativer Pfad zur .bin ist:
        if (!binUrl.startsWith('data:')) {
            binUrl = url.replace('textured.gltf', binUrl);
        }

        statusEl.innerText = "Status: Lade Binärdaten (" + binUrl + ")...";
        const binRes = await fetch(binUrl);
        if (!binRes.ok) throw new Error("Die zugehörige .bin Datei wurde nicht gefunden!");
        const binData = await binRes.arrayBuffer();

        // DEIN MODELL: Accessor 1 (Positionen), BufferView 1, Stride 32
        const acc = gltf.accessors[1];
        const bv = gltf.bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const stride = bv.byteStride || 12; // In deiner Datei 32
        
        const dv = new DataView(binData);
        
        for (let i = 0; i < acc.count; i++) {
            const start = offset + (i * stride);
            
            // X, Y, Z extrahieren und skalieren
            points.push({
                x: dv.getFloat32(start, true) * 800,
                y: dv.getFloat32(start + 4, true) * -800, // Y-Flip
                z: dv.getFloat32(start + 8, true) * 800,
                a: 0.5
            });
        }

        statusEl.innerText = "Status: " + points.length + " Punkte geladen. Rendering läuft.";
        statusEl.style.color = "#BBFF03";

    } catch (e) {
        statusEl.innerText = "ERROR: " + e.message;
        statusEl.style.color = "#ff4444";
        console.error(e);
    }
}

function render() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#010103';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cX = canvas.width / 2;
    const cY = canvas.height / 2;

    rotY += 0.005;
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

    // Zeichne Punkte
    ctx.fillStyle = 'rgba(187, 255, 3, 0.5)';
    for (let i = 0; i < points.length; i++) {
        const p = points[i];

        // 3D Rotation
        let x1 = p.x * cosY + p.z * sinY;
        let z1 = p.z * cosY - p.x * sinY;
        let y2 = p.y * cosX - z1 * sinX;
        let z2 = z1 * cosX + p.y * sinX;

        const s = zoom / (zoom + z2);
        if (z2 > -zoom) {
            const px = cX + x1 * s;
            const py = cY + y2 * s;
            
            // Gaussian Splat Effekt (einfachere Version für Speed)
            ctx.globalAlpha = p.a * s;
            ctx.fillRect(px, py, 3 * s, 3 * s);
        }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(render);
}

loadGltf();
render();
</script>
</body>
</html>
